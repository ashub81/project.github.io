<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyanodaya - Gamified Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom class to hide views */
        .view-hidden {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="container mx-auto p-4 max-w-4xl">
        <!-- Header Section -->
        <header class="bg-white rounded-xl shadow-md p-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-purple-700">Gyanodaya</h1>
                <p class="text-gray-500">Welcome back, Priya Sharma!</p>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-right">
                    <p class="font-semibold">1250 Points</p>
                    <p class="text-sm text-yellow-500">Level 5</p>
                </div>
                <img src="https://placehold.co/100x100/a855f7/ffffff?text=P" alt="Profile" class="w-14 h-14 rounded-full border-2 border-purple-500" />
            </div>
        </header>

        <!-- Navigation Bar -->
        <nav class="mt-6 bg-white rounded-xl shadow-md p-2 flex justify-around">
            <button data-target="dashboard" class="nav-button flex-1 text-center p-3 rounded-lg transition-colors bg-purple-100 text-purple-700 font-bold">
                <span class="text-2xl">🏠</span>
                <span class="block text-sm mt-1">Dashboard</span>
            </button>
            <button data-target="subject" class="nav-button flex-1 text-center p-3 rounded-lg transition-colors text-gray-600 hover:bg-gray-50">
                <span class="text-2xl">📚</span>
                <span class="block text-sm mt-1">Subjects</span>
            </button>
            <button data-target="leaderboard" class="nav-button flex-1 text-center p-3 rounded-lg transition-colors text-gray-600 hover:bg-gray-50">
                <span class="text-2xl">🏆</span>
                <span class="block text-sm mt-1">Leaderboard</span>
            </button>
        </nav>

        <!-- Main Content Area -->
        <main class="mt-6">
            <!-- Dashboard View -->
            <div id="dashboard-view" class="view-section">
                <div class="bg-white rounded-xl shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">Daily Challenge</h2>
                    <div class="bg-yellow-100 border-l-4 border-yellow-400 p-4 rounded-r-lg flex justify-between items-center">
                        <div>
                            <p class="font-semibold">Daily Math Quiz</p>
                            <p class="text-sm text-yellow-700">Earn 50 extra points!</p>
                        </div>
                        <button class="bg-yellow-400 text-white font-bold py-2 px-4 rounded-lg hover:bg-yellow-500 transition-colors">Start</button>
                    </div>
                </div>
    
                <div class="mt-6 bg-white rounded-xl shadow-md p-6">
                    <h2 class="text-xl font-bold mb-4">Recent Activity</h2>
                    <ul class="space-y-3">
                        <li class="flex items-center space-x-3 p-3 bg-gray-50 rounded-lg">
                            <span class="text-lg">🔬</span>
                            <div>
                                <p class="font-semibold">Science</p>
                                <p class="text-sm text-gray-500">Badge: "Molecule Master"</p>
                            </div>
                        </li>
                        <li class="flex items-center space-x-3 p-3 bg-gray-50 rounded-lg">
                            <span class="text-lg">📜</span>
                            <div>
                                <p class="font-semibold">History</p>
                                <p class="text-sm text-gray-500">Completed "Ancient Civilizations"</p>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Subjects View -->
            <div id="subject-view" class="view-section view-hidden">
                <!-- Content will be generated by JavaScript -->
            </div>

            <!-- Leaderboard View -->
            <div id="leaderboard-view" class="view-section view-hidden">
                <!-- Content will be generated by JavaScript -->
            </div>

        </main>

        <!-- Footer -->
        <footer class="text-center text-gray-500 text-sm mt-8 pb-4">
            <p>&copy; 2025 Gyanodaya. Empowering Rural Minds.</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // --- DATA ---
            const subjects = [
                { name: 'Mathematics', icon: '🔢', progress: 75, color: 'blue' },
                { name: 'Science', icon: '🔬', progress: 50, color: 'green' },
                { name: 'History', icon: '📜', progress: 90, color: 'orange' },
                { name: 'English', icon: '🔤', progress: 30, color: 'red' },
            ];

            const players = [
                { rank: 1, name: 'Rohan Patel', points: 1500, avatar: 'https://placehold.co/50x50/22c55e/ffffff?text=R' },
                { rank: 2, name: 'Priya Sharma', points: 1250, avatar: 'https://placehold.co/50x50/a855f7/ffffff?text=P', isCurrentUser: true },
                { rank: 3, name: 'Amit Singh', points: 1100, avatar: 'https://placehold.co/50x50/3b82f6/ffffff?text=A' },
                { rank: 4, name: 'Sunita Devi', points: 950, avatar: 'https://placehold.co/50x50/f97316/ffffff?text=S' },
                { rank: 5, name: 'Vikram Kumar', points: 800, avatar: 'https://placehold.co/50x50/ef4444/ffffff?text=V' },
            ];

            // --- DOM ELEMENTS ---
            const subjectView = document.getElementById('subject-view');
            const leaderboardView = document.getElementById('leaderboard-view');
            const navButtons = document.querySelectorAll('.nav-button');
            const viewSections = document.querySelectorAll('.view-section');

            // --- RENDER FUNCTIONS ---
            function renderSubjects() {
                let content = '<div class="grid grid-cols-1 md:grid-cols-2 gap-6">';
                subjects.forEach(subject => {
                    content += `
                        <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow cursor-pointer">
                            <div class="flex items-center space-x-4">
                                <span class="text-4xl p-3 bg-${subject.color}-100 rounded-full">${subject.icon}</span>
                                <div>
                                    <h3 class="text-lg font-bold">${subject.name}</h3>
                                    <p class="text-sm text-gray-500">You've completed ${subject.progress}%</p>
                                </div>
                            </div>
                            <div class="mt-4 bg-gray-200 rounded-full h-2.5">
                                <div class="bg-${subject.color}-500 h-2.5 rounded-full" style="width: ${subject.progress}%"></div>
                            </div>
                        </div>
                    `;
                });
                content += '</div>';
                subjectView.innerHTML = content;
            }

            function renderLeaderboard() {
                let content = '<div class="bg-white rounded-xl shadow-md p-6">';
                content += '<h2 class="text-xl font-bold mb-4 text-center">Top Learners 🏆</h2>';
                content += '<div class="space-y-3">';
                players.forEach(player => {
                    const highlightClass = player.isCurrentUser ? 'bg-purple-100 border-2 border-purple-400' : 'bg-gray-50';
                    content += `
                        <div class="flex items-center p-3 rounded-lg ${highlightClass}">
                            <span class="text-lg font-bold w-8">${player.rank}</span>
                            <img src="${player.avatar}" alt="${player.name}" class="w-12 h-12 rounded-full mx-4" />
                            <span class="font-semibold flex-grow">${player.name}</span>
                            <span class="font-bold text-purple-600">${player.points} pts</span>
                        </div>
                    `;
                });
                content += '</div></div>';
                leaderboardView.innerHTML = content;
            }

            // --- NAVIGATION LOGIC ---
            function handleNavClick(event) {
                const targetViewId = event.currentTarget.dataset.target;

                // Update button styles
                navButtons.forEach(btn => {
                    btn.classList.remove('bg-purple-100', 'text-purple-700', 'font-bold');
                    btn.classList.add('text-gray-600', 'hover:bg-gray-50');
                });
                event.currentTarget.classList.add('bg-purple-100', 'text-purple-700', 'font-bold');
                event.currentTarget.classList.remove('text-gray-600', 'hover:bg-gray-50');


                // Update visible view
                viewSections.forEach(section => {
                    if (section.id === targetViewId + '-view') {
                        section.classList.remove('view-hidden');
                    } else {
                        section.classList.add('view-hidden');
                    }
                });
            }

            // --- INITIALIZATION ---
            renderSubjects();
            renderLeaderboard();
            navButtons.forEach(button => button.addEventListener('click', handleNavClick));
        });
    </script>
</body>
</html>
